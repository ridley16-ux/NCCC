<style>
* { box-sizing: border-box; }
html { font-family: Arial, Helvetica, sans-serif; }
body { margin: 0; background: #0f0f0f; color: #ffffff; }
.content { max-width: 860px; margin: 0 auto 24px; padding: 12px 16px 0; }
</style>
</head>
<body>
<div id="site-header"></div>
<main class="content" id="main-content">
  <section class="bonus-track">
    <img
      src="/assets/img/bonus/everybody-runs.webp"
      alt="Everybody Runs artwork"
      class="bonus-artwork"
    />

    <h1>Everybody Runs</h1>
    <p class="bonus-artist">Nick Songs</p>

    <div class="bonus-player-card">
      <audio controls class="bonus-player" preload="none">
        <source src="/assets/audio/everybody-runs.mp3" type="audio/mpeg">
        Your browser does not support the audio element.
      </audio>

      <a class="bonus-download" href="/assets/audio/everybody-runs.mp3" download>Download track</a>
    </div>

    <div class="bonus-lyrics-wrap">
      <h2 class="bonus-lyrics-heading">Lyrics</h2>
      <div id="lyrics" class="bonus-lyrics">
        <p>Loading lyrics...</p>
      </div>
    </div>
  </section>
</main>
<div id="site-footer"></div>
<script src="/assets/js/shared.js"></script>
<script>
  const headerContainer = document.getElementById("site-header");
  fetch("/assets/header.html")
    .then((r) => r.text())
    .then((html) => {
      headerContainer.innerHTML = html;
      document.dispatchEvent(new Event("header:ready"));
    })
    .catch(() => {
      headerContainer.innerHTML = "";
    });

  const footerContainer = document.getElementById("site-footer");
  fetch("/assets/footer.html")
    .then((r) => r.text())
    .then((html) => {
      footerContainer.innerHTML = html;
      document.dispatchEvent(new Event("footer:ready"));
    })
    .catch(() => {
      footerContainer.innerHTML = "";
    });
</script>
<script>
fetch('/assets/lyrics/everybody-runs.txt')
  .then(response => response.text())
  .then(text => {
    const formatted = text.replace(/\n/g, '<br>');
    document.getElementById('lyrics').innerHTML = formatted;
  })
  .catch(() => {
    document.getElementById('lyrics').innerHTML = 'Lyrics unavailable.';
  });
</script>
</body>
